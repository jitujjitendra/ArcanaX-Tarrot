      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b084ff"/>
      <stop offset="50%" stop-color="#80e1ff"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>
  <circle cx="96" cy="96" r="96" fill="url(#bg-grad)"/>
  <circle cx="96" cy="96" r="80" stroke="#b084ff" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="96" cy="96" r="60" stroke="#80e1ff" stroke-width="0.8" fill="none" opacity="0.3"/>
