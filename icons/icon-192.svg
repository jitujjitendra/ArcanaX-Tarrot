  <circle cx="96" cy="96" r="4" fill="#b084ff"/>
  <!-- Small accent dots at cardinal points -->
  <circle cx="96" cy="28" r="3" fill="#80e1ff" opacity="0.8"/>
  <circle cx="96" cy="164" r="3" fill="#80e1ff" opacity="0.8"/>
  <circle cx="28" cy="96" r="3" fill="#80e1ff" opacity="0.8"/>
  <circle cx="164" cy="96" r="3" fill="#80e1ff" opacity="0.8"/>
